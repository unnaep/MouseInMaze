<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse in Maze</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #fff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 8px;
    padding: 10px;
  }
  h1 { font-size: 20px; letter-spacing: 3px; color: #ffaa00; text-shadow: 0 0 16px #ffaa00; }
  #hud { font-size: 13px; color: #aaa; letter-spacing: 1px; }
  #hud span { color: #ffaa00; }

  /* Main play area: canvas left, floor plans right */
  #game-area {
    display: flex;
    flex-direction: row;
    gap: 14px;
    align-items: flex-start;
  }
  canvas#canvas { display: block; border: 1px solid #333; }

  /* Floor plan panel */
  #floorplans {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .fp-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .fp-label {
    font-size: 9px;
    letter-spacing: 1px;
    color: #666;
    text-transform: uppercase;
  }
  .fp-label.active { color: #ffaa00; }
  canvas.fp-canvas {
    display: block;
    border: 1px solid #333;
    border-radius: 2px;
  }
  canvas.fp-canvas.active { border-color: #ffaa00; box-shadow: 0 0 6px rgba(255,170,0,0.4); }

  /* On phones: stack floor plans below the maze */
  @media (max-width: 600px) {
    #game-area { flex-direction: column; align-items: center; }
    #floorplans { flex-direction: row; flex-wrap: wrap; justify-content: center; }
  }

  #controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  button {
    padding: 6px 16px;
    background: #222;
    border: 1px solid #444;
    color: #ccc;
    font-family: monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
  }
  button:hover { background: #333; border-color: #666; }
  #config-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 11px;
    color: #666;
    align-items: center;
  }
  #config-row label { display: flex; align-items: center; gap: 5px; }
  input[type=range] { accent-color: #ffaa00; width: 90px; }
  input[type=number] {
    width: 44px; background: #222; border: 1px solid #444;
    color: #ccc; font-family: monospace; font-size: 11px;
    padding: 2px 4px; border-radius: 3px; text-align: center;
  }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.78);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  #overlay.hidden { display: none; }
  #overlay-box {
    background: #1a1a2e;
    border: 1px solid #ffaa00;
    border-radius: 6px;
    padding: 24px 32px;
    text-align: center;
    max-width: 300px;
  }
  #overlay-box h2 { color: #ffaa00; font-size: 22px; margin-bottom: 8px; }
  #overlay-box p  { color: #aaa; font-size: 13px; margin-bottom: 16px; }
  #overlay-box button { font-size: 13px; padding: 8px 24px; border-color: #ffaa00; color: #ffaa00; }
</style>
</head>
<body>

<h1>MOUSE IN MAZE</h1>
<div id="hud">
  Floor: <span id="hud-floor">1</span> of <span id="hud-total">3</span>
  &nbsp; Moves: <span id="hud-moves">0</span>
  &nbsp; Time: <span id="hud-time">0:00</span>
</div>

<div id="game-area">
  <canvas id="canvas"></canvas>
  <div id="floorplans"></div>
</div>

<div id="controls">
  <button onclick="newGame()">New Game</button>
  <button onclick="giveUp()">Give Up</button>
  <button id="btn-music" onclick="toggleMusic()">Music: ON</button>
</div>

<div id="config-row">
  <label>Maze size:
    <input type="range" id="cfg-size" min="7" max="41" step="2" value="21"
      oninput="document.getElementById('lbl-size').textContent = +this.value + '×' + this.value">
    <span id="lbl-size">21×21</span>
  </label>
  <label>Floors:
    <input type="number" id="cfg-floors" min="2" max="8" value="3">
  </label>
</div>

<div id="overlay" class="hidden">
  <div id="overlay-box">
    <h2 id="ov-title">YOU WIN!</h2>
    <p id="ov-msg"></p>
    <button onclick="newGame()">Play Again</button>
  </div>
</div>

<script>
'use strict';

// ── Audio ─────────────────────────────────────────────────────────────────
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, start, dur, vol) {
  try {
    const ctx = ac();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur);
  } catch (_) {}
}

const Sfx = {
  move()     { const t = ac().currentTime; playTone(520, 'sine', t, 0.05, 0.04); },
  bump()     { const t = ac().currentTime; playTone(60, 'sawtooth', t, 0.09, 0.09); },
  elevator() { const t = ac().currentTime; [200,320,480,640].forEach((f,i) => playTone(f,'triangle', t+i*0.09, 0.2, 0.09)); },
  win()      { const t = ac().currentTime; [523,659,784,1047,1319].forEach((f,i) => playTone(f,'sine', t+i*0.13, 0.45, 0.11)); },
  giveup()   { const t = ac().currentTime; playTone(200, 'sawtooth', t, 0.3, 0.07); },
};

// Background music – looping melody over a simple bass.
// All music notes route through `musicGain` so we can mute instantly
// without stopping already-scheduled oscillators.
let musicOn = true, musicTimer = null, musicGain = null;

function getMusicGain() {
  if (!musicGain) {
    musicGain = ac().createGain();
    musicGain.gain.value = 1;
    musicGain.connect(ac().destination);
  }
  return musicGain;
}

function playMusicTone(freq, type, start, dur, vol) {
  try {
    const c = ac();
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(getMusicGain());
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur);
  } catch (_) {}
}

const BT = 60 / 118;
const MEL = [
  [330,.5],[392,.5],[440,1],[392,.5],[330,.5],[294,1],
  [262,.5],[294,.5],[330,.5],[392,.5],[440,2],
  [392,.5],[330,.5],[392,.5],[440,.5],[330,2],
  [294,.5],[330,.5],[392,1],[330,.5],[294,.5],[262,2],
];
const BAS = [
  [131,2],[165,2],[131,2],[147,2],
  [131,2],[165,2],[131,2],[165,2],
];

function scheduleLoop(startT) {
  let t = 0;
  MEL.forEach(([f, b]) => { playMusicTone(f,'triangle', startT+t, b*BT*0.75, 0.055); t += b*BT; });
  t = 0;
  BAS.forEach(([f, b]) => { playMusicTone(f,'sine', startT+t, b*BT*0.9, 0.07); t += b*BT; });
  return t;
}

function runMusicLoop() {
  const dur = scheduleLoop(ac().currentTime + 0.05);
  musicTimer = setTimeout(runMusicLoop, (dur - 0.1) * 1000);
}

function toggleMusic() {
  musicOn = !musicOn;
  getMusicGain().gain.value = musicOn ? 1 : 0;
  document.getElementById('btn-music').textContent = musicOn ? 'Music: ON' : 'Music: OFF';
}

// ── State ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let mazes        = [];   // one maze per floor
let currentFloor = 0;
let elevatorPos  = null; // {x, y} – shared across all floors
let cheeseFloor  = 0;
let cheesePos    = null; // [x, y]
let player       = { x: 0, y: 0 };
let solutionPath = null; // array of {x, y, floor}
let cellSize     = 24;
let moves        = 0;

// Timer
let timerStart = null, timerInterval = null;
function startTimer() {
  timerStart = Date.now();
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - timerStart) / 1000);
    document.getElementById('hud-time').textContent =
      `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }, 500);
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

// ── Maze generation (recursive backtracking) ──────────────────────────────
function buildMaze(w, h) {
  if (w % 2 === 0) w++;
  if (h % 2 === 0) h++;
  const grid    = Array.from({ length: h }, () => Array(w).fill('#'));
  const visited = new Set();

  function carve(x, y) {
    for (const [dx, dy] of shuffle([[0,-2],[0,2],[-2,0],[2,0]])) {
      const nx = x + dx, ny = y + dy, key = nx + ',' + ny;
      if (nx > 0 && nx < w-1 && ny > 0 && ny < h-1 && !visited.has(key)) {
        grid[y + dy/2][x + dx/2] = ' ';
        grid[ny][nx] = ' ';
        visited.add(key);
        carve(nx, ny);
      }
    }
  }

  const sx = 1 + Math.floor(Math.random() * Math.floor(w / 2)) * 2;
  const sy = 1 + Math.floor(Math.random() * Math.floor(h / 2)) * 2;
  visited.add(sx + ',' + sy);
  grid[sy][sx] = ' ';
  carve(sx, sy);
  return { grid, w, h };
}

// ── Helpers ───────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function findCenter(m) {
  const cx = Math.floor(m.w / 2), cy = Math.floor(m.h / 2);
  for (let r = 0; r < m.w; r++)
    for (let dy = -r; dy <= r; dy++)
      for (let dx = -r; dx <= r; dx++) {
        const x = cx + dx, y = cy + dy;
        if (x >= 0 && x < m.w && y >= 0 && y < m.h && m.grid[y][x] === ' ')
          return [x, y];
      }
  return [1, 1];
}

function randomPathCell(m, exclude) {
  const excSet = new Set(exclude.map(([x, y]) => x + ',' + y));
  const paths = [];
  for (let y = 0; y < m.h; y++)
    for (let x = 0; x < m.w; x++)
      if (m.grid[y][x] === ' ' && !excSet.has(x + ',' + y))
        paths.push([x, y]);
  return paths[Math.floor(Math.random() * paths.length)];
}

// Find an (x,y) that has at least one path neighbour on EVERY floor,
// so the elevator is reachable no matter which floor you're on.
function findSharedElevatorPos(allMazes) {
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  const m0 = allMazes[0];
  const candidates = [];
  for (let y = 1; y < m0.h - 1; y++)
    for (let x = 1; x < m0.w - 1; x++)
      if (allMazes.every(m => dirs.some(([dx, dy]) => m.grid[y+dy]?.[x+dx] === ' ')))
        candidates.push([x, y]);

  if (!candidates.length) {
    // Fallback: use floor-0 elevator placement
    const dirs2 = [[0,-1],[0,1],[-1,0],[1,0]];
    for (let y = 1; y < m0.h-1; y++)
      for (let x = 1; x < m0.w-1; x++)
        if (m0.grid[y][x] === '#' && dirs2.some(([dx,dy]) => m0.grid[y+dy]?.[x+dx] === ' '))
          candidates.push([x, y]);
  }

  const [x, y] = candidates[Math.floor(Math.random() * candidates.length)];
  return { x, y };
}

// ── 3-D BFS solver ────────────────────────────────────────────────────────
// State: "x,y,floor" – elevator edges connect the same (x,y) across all floors.
function solveBFS3D(sx, sy, sf, gx, gy, gf) {
  const startKey = `${sx},${sy},${sf}`;
  const goalKey  = `${gx},${gy},${gf}`;
  const prev     = new Map([[startKey, null]]);
  const queue    = [[sx, sy, sf]];

  while (queue.length) {
    const [x, y, f] = queue.shift();
    const key = `${x},${y},${f}`;
    if (key === goalKey) {
      const path = [];
      let cur = key;
      while (cur !== null) {
        const [px, py, pf] = cur.split(',').map(Number);
        path.push({ x: px, y: py, floor: pf });
        cur = prev.get(cur);
      }
      return path.reverse();
    }

    const m = mazes[f];
    // Normal moves on current floor
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = x + dx, ny = y + dy;
      const cell = m.grid[ny]?.[nx];
      if ((cell === ' ' || cell === '^') && !prev.has(`${nx},${ny},${f}`)) {
        prev.set(`${nx},${ny},${f}`, key);
        queue.push([nx, ny, f]);
      }
    }
    // Elevator: jump to same (x,y) on every other floor
    if (x === elevatorPos.x && y === elevatorPos.y) {
      for (let nf = 0; nf < mazes.length; nf++) {
        const nk = `${x},${y},${nf}`;
        if (nf !== f && !prev.has(nk)) {
          prev.set(nk, key);
          queue.push([x, y, nf]);
        }
      }
    }
  }
  return [];
}

// ── Game setup ────────────────────────────────────────────────────────────
function newGame() {
  document.getElementById('overlay').classList.add('hidden');
  stopTimer();
  moves = 0;
  solutionPath = null;

  let sz = parseInt(document.getElementById('cfg-size').value);
  if (sz % 2 === 0) sz++;
  const numFloors = Math.max(2, Math.min(8, parseInt(document.getElementById('cfg-floors').value) || 3));

  const maxPx = Math.min(window.innerWidth - 160, window.innerHeight - 180, 520);
  cellSize = Math.max(12, Math.floor(maxPx / sz));
  canvas.width  = sz * cellSize;
  canvas.height = sz * cellSize;

  // Generate one maze per floor
  mazes = Array.from({ length: numFloors }, () => buildMaze(sz, sz));

  // Shared elevator position (reachable on all floors)
  elevatorPos = findSharedElevatorPos(mazes);
  for (const m of mazes) m.grid[elevatorPos.y][elevatorPos.x] = '^';

  // Player starts near center of floor 0
  currentFloor = 0;
  const [cx, cy] = findCenter(mazes[0]);
  player = { x: cx, y: cy };

  // Cheese on a random floor, far from elevator
  cheeseFloor = Math.floor(Math.random() * numFloors);
  cheesePos   = randomPathCell(mazes[cheeseFloor], [
    [cx, cy],
    [elevatorPos.x, elevatorPos.y]
  ]);

  setupMinimaps(numFloors, sz);
  updateHUD();
  draw();
  drawMinimaps();
  startTimer();
}

// ── Floor-plan mini-maps ──────────────────────────────────────────────────
const MM = 80; // minimap pixel size

function setupMinimaps(numFloors, sz) {
  const container = document.getElementById('floorplans');
  container.innerHTML = '';
  for (let f = 0; f < numFloors; f++) {
    const wrap = document.createElement('div');
    wrap.className = 'fp-wrapper';

    const lbl = document.createElement('div');
    lbl.className = 'fp-label' + (f === currentFloor ? ' active' : '');
    lbl.id = `fp-label-${f}`;
    lbl.textContent = `Floor ${f + 1}`;

    const mc = document.createElement('canvas');
    mc.className = 'fp-canvas' + (f === currentFloor ? ' active' : '');
    mc.id = `fp-${f}`;
    mc.width  = MM;
    mc.height = MM;

    wrap.appendChild(lbl);
    wrap.appendChild(mc);
    container.appendChild(wrap);
  }
}

function drawMinimaps() {
  for (let f = 0; f < mazes.length; f++) {
    const mc = document.getElementById(`fp-${f}`);
    if (!mc) continue;

    // Update active state
    mc.className        = 'fp-canvas' + (f === currentFloor ? ' active' : '');
    const lbl           = document.getElementById(`fp-label-${f}`);
    if (lbl) lbl.className = 'fp-label' + (f === currentFloor ? ' active' : '');

    const mctx = mc.getContext('2d');
    const m    = mazes[f];
    const cpx  = MM / m.w;
    const cpy  = MM / m.h;

    // Maze structure (very subtle – walls vs paths)
    for (let y = 0; y < m.h; y++)
      for (let x = 0; x < m.w; x++) {
        mctx.fillStyle = m.grid[y][x] === '#' ? '#1a1a1a' : '#383838';
        mctx.fillRect(x * cpx, y * cpy, cpx + 0.5, cpy + 0.5);
      }

    // Solution path for this floor (small dots)
    if (solutionPath) {
      mctx.fillStyle = 'rgba(220,180,0,0.85)';
      for (const p of solutionPath) {
        if (p.floor !== f) continue;
        mctx.beginPath();
        mctx.arc(p.x * cpx + cpx / 2, p.y * cpy + cpy / 2, Math.max(1, cpx * 0.35), 0, Math.PI * 2);
        mctx.fill();
      }
    }

    // Elevator dot (purple, all floors)
    mctx.fillStyle = '#aa44ff';
    mctx.beginPath();
    mctx.arc(elevatorPos.x * cpx + cpx/2, elevatorPos.y * cpy + cpy/2,
             Math.max(2, cpx * 0.55), 0, Math.PI * 2);
    mctx.fill();

    // Cheese dot (yellow, cheese floor only)
    if (f === cheeseFloor) {
      mctx.fillStyle = '#ffcc00';
      mctx.beginPath();
      mctx.arc(cheesePos[0] * cpx + cpx/2, cheesePos[1] * cpy + cpy/2,
               Math.max(2, cpx * 0.55), 0, Math.PI * 2);
      mctx.fill();
    }

    // Player dot (pink, current floor only)
    if (f === currentFloor) {
      mctx.fillStyle = '#ff4d9d';
      mctx.beginPath();
      mctx.arc(player.x * cpx + cpx/2, player.y * cpy + cpy/2,
               Math.max(2, cpx * 0.65), 0, Math.PI * 2);
      mctx.fill();
    }
  }
}

// ── Main canvas draw ──────────────────────────────────────────────────────
function draw() {
  const cs = cellSize;
  const m  = mazes[currentFloor];
  const { grid, w, h } = m;

  // Maze cells
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const c = grid[y][x];
      if (c === '#') {
        ctx.fillStyle = '#0a0a1e';
        ctx.fillRect(x * cs, y * cs, cs, cs);
        ctx.fillStyle = 'rgba(0,100,200,0.12)';
        ctx.fillRect(x * cs, y * cs, cs, 1);
        ctx.fillRect(x * cs, y * cs, 1, cs);
      } else {
        ctx.fillStyle = '#e8e8f0';
        ctx.fillRect(x * cs, y * cs, cs, cs);
      }
    }
  }

  // Solution path crumbs for THIS floor only
  if (solutionPath) {
    ctx.fillStyle = 'rgba(220, 170, 0, 0.8)';
    for (const p of solutionPath) {
      if (p.floor !== currentFloor) continue;
      ctx.beginPath();
      ctx.arc(p.x * cs + cs / 2, p.y * cs + cs / 2, cs * 0.12, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Helper: draw emoji centred in a grid cell
  function emoji(e, x, y) {
    ctx.font = `${Math.floor(cs * 0.78)}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e, x * cs + cs / 2, y * cs + cs / 2);
  }

  // Helper: coloured cell + emoji, with all canvas state reset to avoid bleed
  function emojiCell(e, x, y, bg) {
    ctx.save();
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
    ctx.fillStyle = bg;
    ctx.fillRect(x * cs, y * cs, cs, cs);
    ctx.fillStyle = '#000000';
    ctx.font = `${Math.floor(cs * 0.78)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e, x * cs + cs / 2, y * cs + cs / 2);
    ctx.restore();
  }

  // Cheese (only on cheese floor)
  if (currentFloor === cheeseFloor)
    emojiCell('🧀', cheesePos[0], cheesePos[1], '#e8e8f0');

  // Elevator (every floor)
  emojiCell('🛗', elevatorPos.x, elevatorPos.y, '#0a0a1e');

  // Player – save/restore so no prior fillStyle or shadow bleeds in
  ctx.save();
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; ctx.globalAlpha = 1;
  ctx.fillStyle = '#000000';
  ctx.font = `${Math.floor(cs * 0.78)}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🐭', player.x * cs + cs / 2, player.y * cs + cs / 2);
  ctx.restore();
}

// ── Actions ───────────────────────────────────────────────────────────────
function movePlayer(dx, dy) {
  const nx   = player.x + dx;
  const ny   = player.y + dy;
  const cell = mazes[currentFloor].grid[ny]?.[nx];
  if (cell !== ' ' && cell !== '^') { Sfx.bump(); return; }

  player.x = nx;
  player.y = ny;
  moves++;
  solutionPath = null;
  Sfx.move();
  updateHUD();

  // Elevator: cycle to next floor, same position
  if (nx === elevatorPos.x && ny === elevatorPos.y) {
    Sfx.elevator();
    currentFloor = (currentFloor + 1) % mazes.length;
    updateHUD();
  }


  // Win: reached cheese on correct floor
  if (nx === cheesePos[0] && ny === cheesePos[1] && currentFloor === cheeseFloor)
    return showWin();

  draw();
  drawMinimaps();
}

function giveUp() {
  if (!mazes.length) return;
  Sfx.giveup();
  solutionPath = solveBFS3D(
    player.x, player.y, currentFloor,
    cheesePos[0], cheesePos[1], cheeseFloor
  );
  draw();
  drawMinimaps();
}

function showWin() {
  stopTimer();
  Sfx.win();
  draw();
  drawMinimaps();
  const s = Math.floor((Date.now() - timerStart) / 1000);
  document.getElementById('ov-title').textContent = 'YOU WIN!';
  document.getElementById('ov-msg').textContent =
    `${moves} moves · ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  document.getElementById('overlay').classList.remove('hidden');
}

function updateHUD() {
  document.getElementById('hud-floor').textContent = currentFloor + 1;
  document.getElementById('hud-total').textContent = mazes.length;
  document.getElementById('hud-moves').textContent = moves;
}

// ── Input ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!mazes.length) return;
  const map = {
    ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
    KeyW:    [0,-1], KeyS:      [0,1], KeyA:      [-1,0], KeyD:       [1,0],
  };
  const d = map[e.code];
  if (d) { e.preventDefault(); movePlayer(...d); }
});

let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStart || !mazes.length) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.hypot(dx, dy) < 15) return;
  if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0);
  else movePlayer(0, dy > 0 ? 1 : -1);
  touchStart = null;
}, { passive: false });

// ── Boot ──────────────────────────────────────────────────────────────────
newGame();
runMusicLoop(); // loop runs always; gain node controls audibility
</script>
</body>
</html>
